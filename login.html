<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كينق لاو | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #1A1A1A;
            color: #F5F5F5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #C79A1B20 0%, transparent 70%);
            z-index: -1;
        }
        
        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?ixlib=rb-4.0.3') center/cover;
            opacity: 0.05;
        }
        
        .login-card {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid #C79A1B;
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 50px rgba(199, 154, 27, 0.3);
            animation: fadeIn 0.8s ease;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo i {
            color: #C79A1B;
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(199, 154, 27, 0.5);
            margin-bottom: 15px;
        }
        
        .logo h1 {
            color: #C79A1B;
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(199, 154, 27, 0.5);
        }
        
        .logo p {
            color: #9E9E9E;
            font-size: 1.1rem;
        }
        
        .discord-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 18px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            width: 100%;
            margin: 30px 0;
            border: 2px solid transparent;
        }
        
        .discord-btn:hover {
            background: #4752C4;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .discord-btn i {
            font-size: 1.5rem;
        }
        
        .info-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(199, 154, 27, 0.2);
        }
        
        .info-box p {
            color: #9E9E9E;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: right;
        }
        
        .info-box i {
            color: #C79A1B;
            width: 20px;
        }
        
        .error-message {
            background: rgba(255, 71, 87, 0.1);
            border: 2px solid #FF4757;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
            color: #FF6B81;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: right;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .footer {
            margin-top: 30px;
            color: #9E9E9E;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-cube"></i>
            <h1>كينق لاو</h1>
            <p>كينق لاو </p>
        </div>
        
        <div id="errorContainer" style="display: none;"></div>
        
        <a href="/auth/discord" class="discord-btn">
            <i class="fab fa-discord"></i>
            تسجيل الدخول بـ Discord
        </a>
        
        <div class="info-box">
            <p><i class="fas fa-shield-alt"></i> يجب تسجيل الدخول أولاً للوصول إلى الموقع</p>
            <p><i class="fas fa-check-circle"></i> معلوماتك آمنة ومحمية</p>
            <p><i class="fas fa-crown"></i> لوحة الإدارة تحتاج رتبة خاصة</p>
        </div>
        
        <div class="footer">
            جميع الحقوق محفوظة © 2026 كينق لاو
        </div>
    </div>
    
    <script>
        // التحقق إذا كان المستخدم مسجل دخول بالفعل
        fetch('/api/me')
            .then(res => res.json())
            .then(data => {
                if (data.authenticated) {
                    // إذا مسجل دخول، يروح للصفحة الرئيسية
                    window.location.href = '/';
                }
            })
            .catch(() => {});
        
        // عرض رسائل الخطأ من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const errorContainer = document.getElementById('errorContainer');
        
        if (error) {
            let errorMessage = '';
            let errorIcon = '❌';
            
            switch(error) {
                case 'unauthorized':
                    errorMessage = 'ليس لديك صلاحية الوصول إلى لوحة الإدارة';
                    errorIcon = '🔒';
                    break;
                case 'auth_failed':
                    errorMessage = 'فشل تسجيل الدخول، حاول مرة أخرى';
                    errorIcon = '⚠️';
                    break;
                case 'verification_failed':
                    errorMessage = 'فشل التحقق من الحساب';
                    errorIcon = '🤖';
                    break;
                case 'no_guild':
                    errorMessage = 'البوت غير متصل بالسيرفر';
                    errorIcon = '🛠️';
                    break;
                case 'bot_error':
                    errorMessage = 'خطأ في الاتصال بالبوت';
                    errorIcon = '🔧';
                    break;
                default:
                    errorMessage = 'حدث خطأ غير متوقع';
                    errorIcon = '❓';
            }
            
            errorContainer.style.display = 'block';
            errorContainer.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>${errorIcon} ${errorMessage}</span>
                </div>
            `;
        }
        
        // تأثير الصوت عند الضغط على الزر
        document.querySelector('.discord-btn').addEventListener('click', () => {
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3');
            audio.volume = 0.2;
            audio.play().catch(() => {});
        });
    </script>
</body>
</html>
