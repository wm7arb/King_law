<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كينق لاو | قوانين الموقع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #1A1A1A;
            color: #F5F5F5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* شاشة التحميل */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1A1A1A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        
        .loading-logo {
            color: #C79A1B;
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(199, 154, 27, 0.7);
            letter-spacing: 2px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(199, 154, 27, 0.7),
                             0 0 20px rgba(199, 154, 27, 0.5),
                             0 0 30px rgba(199, 154, 27, 0.3);
            }
            to {
                text-shadow: 0 0 20px rgba(199, 154, 27, 0.9),
                             0 0 30px rgba(199, 154, 27, 0.7),
                             0 0 40px rgba(199, 154, 27, 0.5);
            }
        }
        
        .loading-bar-container {
            width: 100%;
            max-width: 500px;
            height: 20px;
            background: #424242;
            border-radius: 10px;
            overflow: hidden;
            margin: 30px 0;
            border: 1px solid rgba(199, 154, 27, 0.3);
            position: relative;
        }
        
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #C79A1B, #A67B0F);
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.4), 
                transparent);
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        
        .loading-text {
            color: #9E9E9E;
            font-size: 1.2rem;
            margin-top: 15px;
            height: 25px;
        }
        
        .loading-percentage {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 0 5px rgba(199, 154, 27, 0.8);
        }
        
        .loading-subtitle {
            color: #9E9E9E;
            font-size: 1rem;
            margin-top: 20px;
            direction: rtl;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        body.loaded .container {
            opacity: 1;
        }
        
        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid #C79A1B;
            padding: 15px 0;
            margin-bottom: 40px;
            border-radius: 0 0 10px 10px;
        }
        
        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        .logo {
            color: #C79A1B;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(199, 154, 27, 0.5);
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-links a {
            color: #F5F5F5;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }
        
        .nav-links a:hover {
            background: rgba(199, 154, 27, 0.2);
        }
        
        .nav-links a.active {
            background: #C79A1B;
            color: #1A1A1A;
        }
        
        /* Page Title */
        .page-title {
            text-align: center;
            color: #C79A1B;
            font-size: 2rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(199, 154, 27, 0.3);
        }
        
        /* Rules Buttons Container */
        .rules-buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        @media (max-width: 768px) {
            .rules-buttons-container {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
        
        /* Rule Button - نفس تأثير زر الرجوع */
        .rule-button {
            display: inline-block;
            margin: 0;
            padding: 20px 15px;
            border-radius: 30px;
            border: 2px solid #C79A1B;
            background: transparent;
            color: #C79A1B;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            position: relative;
            overflow: hidden;
            z-index: 1;
            text-align: center;
            box-shadow: 0 0 0 rgba(199, 154, 27, 0);
            min-width: 120px;
            width: 100%;
        }
        
        .rule-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background: rgba(199, 154, 27, 0.2);
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .rule-button:hover {
            background: #C79A1B;
            color: #1A1A1A;
            box-shadow: 0 0 20px #C79A1B;
            transform: translateY(0);
            padding: 20px 15px;
        }
        
        .rule-button:hover::before {
            opacity: 1;
            width: 100%;
            height: 100%;
        }
        
        .rule-button:active {
            background: #C79A1B;
            color: #1A1A1A;
            box-shadow: 0 0 15px #C79A1B;
            transform: translateY(0);
        }
        
        /* Rule Modal */
        .rule-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: #1A1A1A;
            border: 2px solid #C79A1B;
            border-radius: 15px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: 0 0 50px rgba(199, 154, 27, 0.4);
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-header {
            background: linear-gradient(90deg, #1A1A1A, rgba(199, 154, 27, 0.1));
            padding: 25px;
            border-bottom: 1px solid #C79A1B;
            position: relative;
        }
        
        .modal-title {
            color: #C79A1B;
            font-size: 1.8rem;
            text-align: center;
            text-shadow: 0 0 10px rgba(199, 154, 27, 0.5);
        }
        
        .modal-body {
            padding: 30px;
        }
        
        .rules-list {
            list-style-type: none;
        }
        
        .rules-list li {
            color: #E0E0E0;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border-right: 4px solid #C79A1B;
            line-height: 1.7;
            transition: all 0.3s ease;
        }
        
        .rules-list li:hover {
            background: rgba(199, 154, 27, 0.1);
            transform: translateX(-5px);
        }
        
        .empty-rules-message {
            color: #9E9E9E;
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border: 1px dashed #C79A1B;
        }
        
        .modal-footer {
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid rgba(199, 154, 27, 0.3);
        }
        
        .close-modal-btn {
            display: inline-block;
            margin: 0;
            padding: 12px 35px;
            border-radius: 30px;
            border: 2px solid #FF4757;
            background: transparent;
            color: #FF4757;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            position: relative;
            overflow: hidden;
            z-index: 1;
            text-align: center;
            box-shadow: 0 0 0 rgba(255, 71, 87, 0);
            min-width: 120px;
        }
        
        .close-modal-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background: rgba(255, 71, 87, 0.2);
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .close-modal-btn:hover {
            background: #FF4757;
            color: #000000;
            box-shadow: 0 0 20px #FF4757;
            transform: translateY(0);
            padding: 12px 35px;
        }
        
        .close-modal-btn:hover::before {
            opacity: 1;
            width: 100%;
            height: 100%;
        }
        
        .close-modal-btn:active {
            background: #FF4757;
            color: #000000;
            box-shadow: 0 0 15px #FF4757;
            transform: translateY(0);
        }
        
        .back-btn {
            display: inline-block;
            margin: 0;
            padding: 12px 35px;
            border-radius: 30px;
            border: 2px solid #4ecdc4;
            background: transparent;
            color: #4ecdc4;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            position: relative;
            overflow: hidden;
            z-index: 1;
            text-align: center;
            box-shadow: 0 0 0 rgba(78, 205, 196, 0);
            min-width: 120px;
            text-decoration: none;
        }
        
        .back-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background: rgba(78, 205, 196, 0.2);
            transform: translate(-50%, -50%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .back-btn:hover {
            background: #4ecdc4;
            color: #1A1A1A;
            box-shadow: 0 0 20px #4ecdc4;
            transform: translateY(0);
            padding: 12px 35px;
        }
        
        .back-btn:hover::before {
            opacity: 1;
            width: 100%;
            height: 100%;
        }
        
        .back-btn:active {
            background: #4ecdc4;
            color: #1A1A1A;
            box-shadow: 0 0 15px #4ecdc4;
            transform: translateY(0);
        }
        
        .back-btn-container {
            text-align: center;
            margin-top: 40px;
        }
        
        .back-btn i, .close-modal-btn i {
            margin-left: 8px;
        }

        /* Error Message */
        .error-container {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 71, 87, 0.1);
            border-radius: 15px;
            border: 2px solid #FF4757;
            margin: 40px 0;
        }
        
        .error-container i {
            color: #FF4757;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .error-container h2 {
            color: #FF4757;
            margin-bottom: 15px;
        }
        
        .error-container p {
            color: #9E9E9E;
            margin-bottom: 25px;
        }
        
        .retry-btn {
            padding: 12px 30px;
            border: 2px solid #C79A1B;
            background: transparent;
            color: #C79A1B;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .retry-btn:hover {
            background: #C79A1B;
            color: #1A1A1A;
            box-shadow: 0 0 20px #C79A1B;
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">KING LAW</div>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loading-bar"></div>
                <div class="loading-percentage" id="loading-percentage">0%</div>
            </div>
            <div class="loading-text" id="loading-text">جاري تحميل القوانين...</div>
            <div class="loading-subtitle"></div>
        </div>
    </div>
    
    <!-- المحتوى الرئيسي -->
    <div class="container">
        
        <!-- Page Title -->
        <h1 class="page-title">قوانين كينق لاؤ</h1>
        
        <!-- Rules Buttons Container - Dynamic -->
        <div class="rules-buttons-container" id="rules-buttons-container">
            <!-- الأزرار ستضاف هنا ديناميكياً من API -->
        </div>
        
        <!-- Back Button -->
        <div class="back-btn-container">
            <a href="/" class="back-btn">
                <i class="fas fa-home"></i>
                الرجوع إلى الرئيسية
            </a>
        </div>
    </div>
    
    <!-- Modal Container - Dynamic -->
    <div id="modals-container"></div>
    
    <script>
        // متغيرات شاشة التحميل
        const loadingScreen = document.getElementById('loading-screen');
        const loadingBar = document.getElementById('loading-bar');
        const loadingPercentage = document.getElementById('loading-percentage');
        const loadingText = document.getElementById('loading-text');
        const container = document.querySelector('.container');
        
        // محاكاة التحميل
        let progress = 0;
        
        function simulateLoading() {
            const interval = setInterval(() => {
                progress += Math.random() * 15 + 5;
                
                if (progress > 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        loadingScreen.style.opacity = '0';
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                            document.body.classList.add('loaded');
                        }, 500);
                    }, 800);
                }
                
                loadingBar.style.width = `${progress}%`;
                loadingPercentage.textContent = `${Math.min(Math.round(progress), 100)}%`;
                
                if (progress < 30) {
                    loadingText.textContent = '';
                } else if (progress < 60) {
                    loadingText.textContent = '';
                } else if (progress < 90) {
                    loadingText.textContent = '';
                } else {
                    loadingText.textContent = '';
                }
                
            }, 150 + Math.random() * 200);
        }
        
        // ترجمة أسماء الفئات
        const categoryNames = {
            'crime': 'قوانين الاجرام',
            'discord': 'قوانين الديسكورد',
            'realism': 'قوانين الواقعية',
            'accounts': 'قوانين الحسابات',
            'game': 'قوانين لعبة السيرفر',
            'safe': 'قوانين المناطق الآمنة',
            'admin': 'قوانين الصلاحيات',
            'mission': 'قوانين المهمة'
        };
        
        // ترتيب عرض الفئات
        const categoryOrder = ['crime', 'discord', 'realism', 'accounts', 'game', 'safe', 'admin', 'mission'];
        
        // جلب القوانين من API
        async function loadRules() {
            try {
                const response = await fetch('/api/rules');
                const result = await response.json();
                
                if (result.success) {
                    renderRules(result.rules);
                } else {
                    showError('فشل تحميل القوانين');
                }
            } catch (error) {
                console.error('Error loading rules:', error);
                showError('حدث خطأ في الاتصال بالخادم');
            }
        }
        
        // عرض القوانين
        function renderRules(rulesData) {
            const buttonsContainer = document.getElementById('rules-buttons-container');
            const modalsContainer = document.getElementById('modals-container');
            
            buttonsContainer.innerHTML = '';
            modalsContainer.innerHTML = '';
            
            let hasAnyRules = false;
            
            // إنشاء الأزرار والمودالات حسب الترتيب المحدد
            categoryOrder.forEach(category => {
                const rules = rulesData[category] || [];
                
                // اذا كان في قوانين بهذه الفئة أو لا - نعرض الزر حتى لو فارغ
                if (rules.length > 0) {
                    hasAnyRules = true;
                }
                
                // إنشاء الزر
                const button = document.createElement('button');
                button.className = 'rule-button';
                button.dataset.modal = category;
                button.textContent = categoryNames[category] || category;
                buttonsContainer.appendChild(button);
                
                // إنشاء المودال
                const modal = document.createElement('div');
                modal.className = 'rule-modal';
                modal.id = `${category}-modal`;
                
                let rulesHTML = '';
                if (rules.length > 0) {
                    rulesHTML = '<ul class="rules-list">';
                    rules.forEach(rule => {
                        rulesHTML += `<li>${escapeHtml(rule)}</li>`;
                    });
                    rulesHTML += '</ul>';
                } else {
                    rulesHTML = `<div class="empty-rules-message">
                        <i class="fas fa-info-circle" style="font-size: 2rem; margin-bottom: 15px;"></i>
                        <p>لا توجد قوانين مضافة في هذا القسم حالياً</p>
                    </div>`;
                }
                
                modal.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 class="modal-title">${categoryNames[category] || category}</h2>
                        </div>
                        <div class="modal-body">
                            ${rulesHTML}
                        </div>
                        <div class="modal-footer">
                            <button class="close-modal-btn">
                                <i class="fas fa-times"></i> إغلاق
                            </button>
                        </div>
                    </div>
                `;
                
                modalsContainer.appendChild(modal);
            });
            
            // إذا ما في أي قوانين بالمرة
            if (!hasAnyRules) {
                const emptyMessage = document.createElement('div');
                emptyMessage.className = 'empty-rules-message';
                emptyMessage.style.marginTop = '40px';
                emptyMessage.innerHTML = `
                    <i class="fas fa-book-open" style="font-size: 3rem; margin-bottom: 20px;"></i>
                    <h3 style="color: #C79A1B; margin-bottom: 15px;">لا توجد قوانين حالياً</h3>
                    <p style="color: #9E9E9E;">سيتم إضافة القوانين قريباً من قبل الإدارة</p>
                `;
                buttonsContainer.parentNode.insertBefore(emptyMessage, buttonsContainer.nextSibling);
            }
            
            // إعادة ربط الأحداث
            attachEvents();
        }
        
        // دالة لتنظيف النص من الـ HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ربط الأحداث بالأزرار
        function attachEvents() {
            const ruleButtons = document.querySelectorAll('.rule-button');
            const modals = document.querySelectorAll('.rule-modal');
            const closeButtons = document.querySelectorAll('.close-modal-btn');
            
            // فتح المودال
            ruleButtons.forEach(button => {
                button.removeEventListener('click', openModalHandler);
                button.addEventListener('click', openModalHandler);
            });
            
            // إغلاق المودال
            closeButtons.forEach(button => {
                button.removeEventListener('click', closeModalHandler);
                button.addEventListener('click', closeModalHandler);
            });
            
            // إغلاق بالضغط خارج المحتوى
            modals.forEach(modal => {
                modal.removeEventListener('click', outsideClickHandler);
                modal.addEventListener('click', outsideClickHandler);
            });
            
            // إزالة أي تحركات للأزرار
            const allButtons = document.querySelectorAll('.rule-button, .close-modal-btn, .back-btn');
            allButtons.forEach(btn => {
                btn.addEventListener('mousedown', function() {
                    this.style.transform = 'translateY(0)';
                });
                btn.addEventListener('mouseup', function() {
                    this.style.transform = 'translateY(0)';
                });
                btn.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0)';
                });
            });
        }
        
        // Handler لفتح المودال
        function openModalHandler(e) {
            const modalId = this.dataset.modal + '-modal';
            const modal = document.getElementById(modalId);
            
            if (modal) {
                modal.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            }
            
            // صوت عند النقر
            playClickSound();
        }
        
        // Handler لإغلاق المودال
        function closeModalHandler(e) {
            const modal = this.closest('.rule-modal');
            if (modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
            
            // صوت عند النقر
            playClickSound();
        }
        
        // Handler للضغط خارج المحتوى
        function outsideClickHandler(e) {
            if (e.target === this) {
                this.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
        
        // تشغيل صوت النقر
        function playClickSound() {
            const audio = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3');
            audio.volume = 0.2;
            audio.play().catch(e => console.log("Audio error:", e));
        }
        
        // عرض رسالة خطأ
        function showError(message) {
            const container = document.querySelector('.container');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-container';
            errorDiv.innerHTML = `
                <i class="fas fa-exclamation-triangle"></i>
                <h2>خطأ في التحميل</h2>
                <p>${message}</p>
                <button class="retry-btn" onclick="location.reload()">
                    <i class="fas fa-redo"></i> إعادة المحاولة
                </button>
            `;
            
            // إخفاء شاشة التحميل
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.body.classList.add('loaded');
            }, 500);
            
            // إظهار الخطأ
            document.querySelector('.rules-buttons-container').style.display = 'none';
            container.appendChild(errorDiv);
        }
        
        // إغلاق المودال بمفتاح ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const modals = document.querySelectorAll('.rule-modal');
                modals.forEach(modal => {
                    if (modal.style.display === 'flex') {
                        modal.style.display = 'none';
                        document.body.style.overflow = 'auto';
                    }
                });
            }
        });
        
        // تحديث الرابط النشط في النافبار
        function updateActiveNavLink() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-links a');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPath || (currentPath === '/' && href === '/')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }
        
        // بدء التحميل
        window.addEventListener('load', () => {
            // بدء شاشة التحميل
            setTimeout(simulateLoading, 300);
            
            // جلب القوانين
            loadRules();
            
            // تحديث الرابط النشط
            updateActiveNavLink();
            
            // إضافة تأثير الصوت لزر الرجوع
            const backBtn = document.querySelector('.back-btn');
            if (backBtn) {
                backBtn.addEventListener('click', playClickSound);
            }
        });
    </script>
</body>
</html>
