<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> كينق لاو | مؤسسين السيرفر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: #1A1A1A;
            color: #F5F5F5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1A1A1A;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        
        .loading-logo {
            color: #C79A1B;
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(199, 154, 27, 0.7);
            letter-spacing: 2px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(199, 154, 27, 0.7),
                             0 0 20px rgba(199, 154, 27, 0.5),
                             0 0 30px rgba(199, 154, 27, 0.3);
            }
            to {
                text-shadow: 0 0 20px rgba(199, 154, 27, 0.9),
                             0 0 30px rgba(199, 154, 27, 0.7),
                             0 0 40px rgba(199, 154, 27, 0.5);
            }
        }
        
        .loading-bar-container {
            width: 100%;
            max-width: 500px;
            height: 20px;
            background: #424242;
            border-radius: 10px;
            overflow: hidden;
            margin: 30px 0;
            border: 1px solid rgba(199, 154, 27, 0.3);
            position: relative;
        }
        
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #C79A1B, #A67B0F);
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.4), 
                transparent);
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .loading-text {
            color: #9E9E9E;
            font-size: 1.2rem;
            margin-top: 15px;
            height: 25px;
        }
        
        .loading-percentage {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 0 0 5px rgba(199, 154, 27, 0.8);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        body.loaded .container {
            opacity: 1;
        }
        
        .page-title {
            text-align: center;
            color: #C79A1B;
            font-size: 2rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(199, 154, 27, 0.3);
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">كينق لاو</div>
            <div class="loading-bar-container">
                <div class="loading-bar" id="loading-bar"></div>
                <div class="loading-percentage" id="loading-percentage">0%</div>
            </div>
            <div class="loading-text" id="loading-text"></div>
        </div>
    </div>
    
    <div class="container">
        <h1 class="page-title">مؤسسين سيرفر كينق لاو</h1>
    </div>

    <script>
        // عناصر التحميل
        const loadingScreen = document.getElementById('loading-screen');
        const loadingBar = document.getElementById('loading-bar');
        const loadingPercentage = document.getElementById('loading-percentage');
        const loadingText = document.getElementById('loading-text');
        
        const loadingMessages = [
            'جاري تحميل النظام...',
            'تجهيز بيانات المؤسسين...',
            'تقريباً انتهينا...',
            'مرحباً بكم في كينق لاو!'
        ];

        let progress = 0;
        let messageIndex = 0;

        // تحديث شريط التحميل
        function updateLoading() {
            if (progress < 100) {
                progress += Math.random() * 15 + 5;
                if (progress > 100) progress = 100;
                
                loadingBar.style.width = progress + '%';
                loadingPercentage.textContent = Math.floor(progress) + '%';
                
                if (progress >= 25 && messageIndex === 0) {
                    loadingText.textContent = loadingMessages[0];
                    messageIndex = 1;
                } else if (progress >= 50 && messageIndex === 1) {
                    loadingText.textContent = loadingMessages[1];
                    messageIndex = 2;
                } else if (progress >= 75 && messageIndex === 2) {
                    loadingText.textContent = loadingMessages[2];
                    messageIndex = 3;
                }
                
                if (progress < 100) {
                    setTimeout(updateLoading, 200);
                } else {
                    loadingText.textContent = loadingMessages[3];
                    setTimeout(() => {
                        loadingScreen.style.opacity = '0';
                        document.body.classList.add('loaded');
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                        }, 500);
                    }, 800);
                }
            }
        }

        // بدء التحميل
        window.addEventListener('load', function() {
            setTimeout(updateLoading, 500);
        });
    </script>
</body>
</html>
